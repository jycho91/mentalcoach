const fmtDate = (iso) => { const d = new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
const fmtTime = (iso) => { const d = new Date(iso); return `${fmtDate(iso)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const pct = (n) => `${Math.round(n*100)}%`;
const escapeHtml = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

      <button onclick="goto('scan')" class="inline-flex items-center gap-1 text-sm text-mute hover:text-ink rounded-md px-2 h-9 hover:bg-lineSoft">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> 스캔 결과
      </button>
      <span class="h-5 w-px bg-line"></span>
      <h1 class="text-2xl font-extrabold tracking-tight">개정안 패키지</h1>
    </div>

    <div class="mb-8 rounded-lg overflow-hidden shadow-sm border border-line animate-fadein">
      <div class="bg-gradient-to-br from-navy to-navy/80 p-6 text-white">
        <div class="mb-2 flex flex-wrap items-center gap-2">
          <span class="inline-flex items-center gap-1 rounded-md bg-warning text-white text-[11px] font-bold px-2.5 py-1">
            <i data-lucide="sparkles" class="w-3 h-3"></i>결재용 패키지
          </span>
          <span class="rounded-md border border-white/30 text-white text-[11px] font-bold px-2.5 py-1">신뢰도 ${pct(pkg.confidence)}</span>
          <span class="rounded-md border border-white/30 text-white text-[11px] font-bold px-2.5 py-1">Demo / Pre-generated</span>
        </div>
        <h2 class="text-3xl font-extrabold tracking-tight">${pkg.ruleTitle}</h2>
        <p class="mt-1 text-sm text-white/80">${law.lawName} ${law.articleNumber} · ${pkg.lawChangeSummary}</p>
        <p class="mt-3 text-xs text-white/60">생성 시각: ${fmtTime(new Date().toISOString())}</p>
      </div>
    </div>

    <div class="mb-3 grid grid-cols-2 md:grid-cols-4 gap-1 rounded-md bg-lineSoft p-1">
      ${tabBtn('reasoning','개정 사유','file-text')}
      ${tabBtn('highlights','주요 골자','check-circle-2')}
      ${tabBtn('diff','신구조문대비표','git-compare')}
      ${tabBtn('precedents','판례 검증','scale')}
    </div>

    <div class="mt-3 animate-fadein">${content}</div>

    <div class="mt-8 flex flex-wrap items-center justify-between gap-3 rounded-lg border border-line bg-bg p-4">
      <div class="text-sm text-mute">
        본 패키지는 <b>결재용 초안</b>입니다. 검토 후 승인 / 수정 / 반려 결정은 사람이 합니다.
      </div>
      <div class="flex gap-2">
        <button class="inline-flex items-center gap-1 rounded-md border border-line bg-surface text-sm font-semibold px-3 h-9 text-mute" disabled>
          <i data-lucide="printer" class="w-4 h-4"></i>DOCX 다운로드
        </button>
        <button onclick="goto('scan')" class="rounded-md border border-line bg-surface text-sm font-semibold px-3 h-9 hover:bg-lineSoft">다른 규정 보기</button>
        <button onclick="alert('결재 상신 (데모)')" class="rounded-md bg-navy text-white text-sm font-semibold px-3 h-9 hover:bg-accent">결재 상신</button>
      </div>
    </div>
  `;
}

function viewScanning() {
  return `
    <div class="flex flex-col items-center justify-center min-h-[60vh] gap-5 animate-fadein">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 rounded-full border-4 border-line"></div>
        <div class="absolute inset-0 rounded-full border-4 border-accent border-t-transparent animate-spin"></div>
      </div>
      <div class="text-center">
        <div class="text-lg font-bold tracking-tight">법령 개정 스캔 중</div>
        <div class="text-sm text-mute mt-1">Korea Law MCP가 국가법령정보센터를 폴링하고, 임베딩 매칭으로 영향 조문을 추리고 있습니다…</div>
      </div>
      <div class="mt-2 w-72 h-1.5 rounded-full bg-lineSoft overflow-hidden">
        <div class="h-full scan-shimmer bg-accent/30 w-full"></div>
      </div>
    </div>
  `;
}

// ──────────────────────────────────────────────
// STATE + ROUTER
// ──────────────────────────────────────────────
const state = {
  view: 'dashboard', // 'dashboard' | 'scanning' | 'scan' | 'amendment'
  ruleId: null,
  activeTab: 'reasoning',
  scanStartedAt: null,
  scanFinishedAt: null,
};

function render() {
  const root = document.getElementById('root');
  let html = '';
  if (state.view === 'dashboard') html = viewDashboard();
  else if (state.view === 'scanning') html = viewScanning();
  else if (state.view === 'scan') html = viewScanResults();
  else if (state.view === 'amendment') html = viewAmendment(state.ruleId);
  root.innerHTML = html;
  lucide.createIcons();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function goto(view, ruleId) {
  state.view = view;
  if (ruleId) state.ruleId = ruleId;
  if (view === 'amendment') state.activeTab = 'reasoning';
  render();
}

function setTab(t) { state.activeTab = t; render(); }

function runScan() {
  state.scanStartedAt = new Date().toISOString();
  state.view = 'scanning';
  render();
  setTimeout(() => {
    state.scanFinishedAt = new Date().toISOString();
    state.view = 'scan';
    render();
  }, 1600);
}

// init
document.addEventListener('DOMContentLoaded', () => {
  render();
});
</script>
</body>
</html>
