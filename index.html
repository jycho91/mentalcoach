<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 코치</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 메인 앱 영역 -->
  <div id="app"></div>

  <!-- 하단 탭바 -->
  <nav id="tab-bar">
    <button class="tab-btn" data-tab="record">
      <span class="tab-icon">&#9997;</span>
      <span class="tab-label">기록</span>
    </button>
    <button class="tab-btn" data-tab="chat">
      <span class="tab-icon">&#128172;</span>
      <span class="tab-label">대화</span>
    </button>
    <button class="tab-btn" data-tab="report">
      <span class="tab-icon">&#128202;</span>
      <span class="tab-label">리포트</span>
    </button>
    <button class="tab-btn" data-tab="session">
      <span class="tab-icon">&#128203;</span>
      <span class="tab-label">세션 준비</span>
    </button>
    <button class="tab-btn" data-tab="timeline">
      <span class="tab-icon">&#128197;</span>
      <span class="tab-label">타임라인</span>
    </button>
  </nav>

  <!-- 설정 모달 -->
  <div id="settings-overlay" class="modal-overlay hidden" aria-hidden="true"></div>
  <div id="settings-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-header">
      <h2>설정</h2>
      <button id="settings-close" class="modal-close-btn" aria-label="닫기">&times;</button>
    </div>
    <div class="modal-body" id="settings-body">
      <!-- app.js에서 동적으로 채움 -->
    </div>
  </div>

  <!-- 토스트 메시지 -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
